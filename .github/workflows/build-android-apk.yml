name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      # Only rebuild when actual Kodi source or bundled addons change.
      # Pushes that only touch docs, skin XMLs, README, etc. are skipped.
      - 'xbmc/**'
      - 'tools/**'
      - 'cmake/**'
      - 'addons/**'
      - 'userdata/**'
      - 'media/**'
      - 'system/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf bison build-essential ccache curl flex gawk git gperf \
            lib32stdc++6 lib32z1 lib32z1-dev libcurl4-openssl-dev \
            unzip zip zlib1g-dev
          ccache --max-size=5G
          ccache --set-config=compression=true
          ccache --zero-stats

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Apache Ant
        run: |
          curl -fsSL "https://archive.apache.org/dist/ant/binaries/apache-ant-1.10.15-bin.tar.gz" \
            -o /tmp/ant.tar.gz
          sudo tar -xzf /tmp/ant.tar.gz -C /opt/
          echo "ANT_HOME=/opt/apache-ant-1.10.15" >> $GITHUB_ENV
          echo "/opt/apache-ant-1.10.15/bin" >> $GITHUB_PATH

      - name: Restore Android SDK cache
        id: sdk-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/android-sdk
          key: android-sdk-35-ndk-28.2.13676358

      - name: Set up Android SDK and NDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -o /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools
          mv /tmp/cmdtools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$HOME/android-sdk --licenses > /dev/null

          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;28.2.13676358"

      - name: Save Android SDK cache
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/android-sdk
          key: android-sdk-35-ndk-28.2.13676358

      - name: Set Android SDK env vars
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -keystore ~/.android/debug.keystore -v \
            -alias androiddebugkey \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keypass android -storepass android \
            -keyalg RSA -keysize 2048 -validity 10000

      - name: Restore depends tarballs cache
        uses: actions/cache/restore@v4
        id: tarballs-cache
        with:
          path: $HOME/kodi-tarballs
          key: kodi-tarballs-${{ hashFiles('tools/depends/target/**/*.cmake', 'tools/depends/target/**/Makefile') }}
          restore-keys: kodi-tarballs-

      - name: Restore built depends cache
        uses: actions/cache/restore@v4
        id: depends-cache
        with:
          path: ~/kodi-depends
          key: kodi-depends-armv7-${{ hashFiles('tools/depends/**') }}
          restore-keys: kodi-depends-armv7-

      - name: Restore ccache
        uses: actions/cache/restore@v4
        id: ccache-restore
        with:
          path: ~/.cache/ccache
          key: kodi-ccache-armv7-${{ github.sha }}
          restore-keys: |
            kodi-ccache-armv7-

      - name: Fix JDK headers for libbluray
        run: |
          sudo mkdir -p "$JAVA_HOME/include/android"
          sudo ln -sf "$JAVA_HOME/include/linux/"* "$JAVA_HOME/include/android/" 2>/dev/null || true

      - name: Configure depends build system
        run: |
          chmod +x tools/depends/bootstrap
          cd tools/depends
          ./bootstrap
          ./configure \
            --host=arm-linux-androideabi \
            --with-tarballs=$HOME/kodi-tarballs \
            --with-sdk-path=$HOME/android-sdk \
            --prefix=$HOME/kodi-depends

      - name: Build depends
        if: steps.depends-cache.outputs.cache-hit != 'true'
        run: |
          cd tools/depends && make -j$(nproc)

      - name: Save depends tarballs cache
        uses: actions/cache/save@v4
        if: steps.tarballs-cache.outputs.cache-hit != 'true'
        with:
          path: $HOME/kodi-tarballs
          key: ${{ steps.tarballs-cache.outputs.cache-primary-key }}

      - name: Save built depends cache
        uses: actions/cache/save@v4
        if: steps.depends-cache.outputs.cache-hit != 'true'
        with:
          path: ~/kodi-depends
          key: ${{ steps.depends-cache.outputs.cache-primary-key }}

      - name: Configure CMake build system
        run: |
          make -C tools/depends/target/cmakebuildsys BUILD_DIR=$HOME/kodi-build

      - name: Build Kodi
        run: |
          cmake --build $HOME/kodi-build --parallel $(nproc)

      - name: Save ccache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cache/ccache
          key: kodi-ccache-armv7-${{ github.sha }}

      - name: Build APK
        run: |
          find $HOME/kodi-build -name "gradlew" -exec chmod +x {} \;
          cmake --build $HOME/kodi-build --target apk

      - name: Sign and rename APK
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE }}
          KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > /tmp/release.keystore
          UNSIGNED=$(find $HOME/kodi-build -name "*.apk" -type f | head -1)
          # Name the output file properly (tag builds use the tag, others use short SHA)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            APK_NAME="kodi-adam-${GITHUB_REF_NAME}.apk"
          else
            APK_NAME="kodi-adam-$(echo $GITHUB_SHA | cut -c1-7).apk"
          fi
          SIGNED="/tmp/${APK_NAME}"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass pass:$KEYSTORE_PASS \
            --ks-key-alias $KEY_ALIAS \
            --key-pass pass:$KEY_PASS \
            --out "$SIGNED" \
            "$UNSIGNED"
          echo "SIGNED_APK=$SIGNED" >> $GITHUB_ENV
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV

      - name: ccache stats
        if: always()
        run: ccache --show-stats

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-adam-${{ github.sha }}
          path: ${{ env.SIGNED_APK }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Kodi Adam ${{ github.ref_name }}
          files: ${{ env.SIGNED_APK }}
          generate_release_notes: true
